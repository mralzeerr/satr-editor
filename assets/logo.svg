  </defs>
  <rect width="256" height="256" rx="54" fill="url(#satr-g)"/>
  <g stroke="#f5f7ff" stroke-width="20" stroke-linecap="round" fill="none">
    <path d="M196 114v36"/>
    <path d="M168 114v36"/>
    <path d="M140 114v36"/>
